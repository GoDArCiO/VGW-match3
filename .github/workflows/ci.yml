# Continuous integration: runs the EditMode test suite via GameCI.
#
# Uses GameCI (game-ci.github.io), the standard way to run Unity headless in the cloud on a Linux
# container; the same compile + test gate as `tools/unity.ps1 test` runs locally on Windows.
#
# MANUAL TRIGGER ONLY (workflow_dispatch): running Unity in CI needs a Unity license stored as a repo
# secret, and I didn't want to attach a personal license to a showcase project. The suite is verified
# locally instead (tools\unity.ps1 compile -> COMPILE OK, tools\unity.ps1 test -> TESTS PASS 50/50).
# To enable cloud runs, add these repo secrets (Settings -> Secrets and variables -> Actions) and run
# it from the Actions tab:
#   UNITY_LICENSE   - contents of your Unity .ulf license file (Personal is fine). See:
#                     https://game.ci/docs/github/activation
#   UNITY_EMAIL     - Unity account email   (used for license activation)
#   UNITY_PASSWORD  - Unity account password
name: CI

on:
  workflow_dispatch:   # manual run from the Actions tab (see header)

jobs:
  editmode-tests:
    name: EditMode tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      # Cache the imported Library so runs after the first don't re-import the whole project.
      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.3.11f1   # must match ProjectSettings/ProjectVersion.txt
          testMode: editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: editmode-test-results
          path: artifacts
